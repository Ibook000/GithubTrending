name: 自动生成 GitHub 趋势雷达

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: github-trending-pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONUNBUFFERED: "1"
      SITE_URL: ${{ vars.SITE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}

    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: 运行质量检查
        run: |
          ruff check .
          pytest

      - name: 恢复上一版开放数据与历史记录
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p site/data history
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            temp_dir=$(mktemp -d)
            git clone --depth=1 --branch gh-pages --single-branch \
              "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$temp_dir/pages"
            if [ -f "$temp_dir/pages/data/latest.json" ]; then
              cp "$temp_dir/pages/data/latest.json" site/data/latest.json
            fi
            if [ -d "$temp_dir/pages/history" ]; then
              cp -R "$temp_dir/pages/history/." history/
            fi
          fi

      - name: 生成榜单、JSON 与 RSS
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL || 'http://154.217.247.37:8317/v1' }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'deepseek-v4-flash' }}
          OUTPUT_DIR: site
        run: python github_trending_cards.py

      - name: 创建每日历史快照
        run: |
          snapshot_date=$(python -c "import json; print(json.load(open('site/data/latest.json'))['date'])")
          snapshot_dir="history/$snapshot_date"
          mkdir -p "$snapshot_dir"
          cp site/index.html "$snapshot_dir/index.html"
          cp site/styles.css "$snapshot_dir/styles.css"
          cp site/app.js "$snapshot_dir/app.js"
          cp site/favicon.svg "$snapshot_dir/favicon.svg"
          cp site/data/latest.json "$snapshot_dir/data.json"
          mkdir -p "$snapshot_dir/data"
          cp site/data/latest.json "$snapshot_dir/data/latest.json"
          cp site/feed.xml "$snapshot_dir/feed.xml"
          cp site/metadata.json "$snapshot_dir/metadata.json"
          python scripts/generate_history_stats.py
          mkdir -p site/history
          cp -R history/. site/history/

      - name: 校验发布文件
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from xml.etree import ElementTree as ET

          root = Path("site")
          required = ["index.html", "styles.css", "app.js", "feed.xml", "data/latest.json", "history/index.html"]
          missing = [name for name in required if not (root / name).is_file() or (root / name).stat().st_size == 0]
          if missing:
              raise SystemExit(f"发布文件缺失或为空: {missing}")
          data = json.loads((root / "data/latest.json").read_text(encoding="utf-8"))
          if not data["periods"]["daily"]:
              raise SystemExit("日榜为空，拒绝部署")
          ET.parse(root / "feed.xml")
          print(f"校验通过：日榜 {len(data['periods']['daily'])} 条")
          PY

      - name: 部署到 gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
